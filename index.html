<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중국어 - 한국어 사진 번역기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-teal-600 text-white p-4 shadow-md flex justify-center items-center shrink-0 relative z-10">
        <h1 class="text-lg font-bold tracking-wide"><i class="fas fa-book-open mr-2 text-teal-200"></i>중국어 - 한국어 사전 번역기
        </h1>
    </div>

    <div class="flex-1 bg-white p-6 flex flex-col relative overflow-y-auto">

        <div id="imagePreviewContainer"
            class="hidden w-full mb-6 flex flex-col items-center border-b border-gray-100 pb-6 shrink-0">
            <span class="text-xs text-gray-400 mb-3 font-bold bg-gray-100 px-3 py-1 rounded-full">📷 분석된 원본 이미지</span>
            <img id="imagePreview" class="max-h-60 rounded-xl shadow-md border border-gray-200 object-contain" src=""
                alt="preview">
        </div>

        <div id="cnation-chineseOutput"
            class="text-base text-gray-800 leading-relaxed whitespace-pre-wrap w-full flex-1 font-medium">
            <div class="h-full flex flex-col items-center justify-center text-gray-300 mt-10">
                <i class="fas fa-camera text-5xl mb-4 text-gray-200"></i>
                <p class="text-center text-gray-400">하단의 카메라 버튼을 눌러<br>번역할 내용을 촬영하세요.</p>
            </div>
        </div>

        <div id="cnation-loading"
            class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-20">
            <i class="fas fa-expand fa-spin text-5xl text-teal-500 mb-4"></i>
            <span class="text-teal-600 font-bold text-lg">AI가 이미지를 판독 중입니다...</span>
            <span class="text-gray-400 text-sm mt-2">텍스트가 길 경우 조금 걸릴 수 있습니다.</span>
        </div>
    </div>

    <div class="bg-white border-t border-gray-200 p-4 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] z-10 shrink-0">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">

        <button onclick="document.getElementById('cameraInput').click()"
            class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-2xl font-bold text-lg flex items-center justify-center shadow-lg active:scale-95 transition-transform">
            <i class="fas fa-camera text-2xl mr-3"></i>사진 찍어서 번역하기
        </button>
    </div>

    <script type="module">
        // 🔑 Supabase 설정 (금고)
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let qwenApiKey = "";

        // ★ 앱 시작 시 Qwen 키 불러오기
        async function fetchApiKeys() {
            const { data } = await _supabase.from('cnation_api_keys').select('api_key').eq('engine_name', 'Qwen').single();
            if (data) {
                qwenApiKey = data.api_key;
            } else {
                alert("API 키를 불러오지 못했습니다. DB를 확인해주세요.");
            }
        }
        fetchApiKeys();

        // ★ 이미지 용량 최적화 (API 전송 속도 향상)
        function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // 가로 폭을 최대 1000px로 제한하여 화질과 속도 타협
                        const MAX_WIDTH = 1000;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); // 80% 화질로 압축
                    };
                };
            });
        }

        // ★ 사진 촬영 및 Qwen-VL 번역 로직
        document.getElementById('cameraInput').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!qwenApiKey) return alert("엔진 키가 준비되지 않았습니다. 잠시 후 다시 시도해주세요.");

            // 1. 로딩 화면 표시
            document.getElementById('cnation-loading').classList.remove('hidden');

            // 2. 이미지 압축 및 미리보기 표시
            const base64Image = await resizeImage(file);
            document.getElementById('imagePreview').src = base64Image;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');

            try {
                // 3. Qwen-VL-Plus (비전 모델) 호출
                const res = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${qwenApiKey}` },
                    body: JSON.stringify({
                        model: "qwen-vl-plus",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "image_url", image_url: { url: base64Image } },
                                { type: "text", text: "이 이미지에 있는 중국어 텍스트를 파악해서 한국어로 상세하고 자연스럽게 번역해 줘. 안내문이나 설명서라면 사용자가 잘 이해할 수 있도록 문맥을 살려 풀어서 설명해 주고, 결과는 오직 한국어 번역 내용만 깔끔하게 텍스트로 보여줘." }
                            ]
                        }]
                    })
                });

                if (!res.ok) throw new Error("API 요청 실패");

                const data = await res.json();
                const resultText = data.choices[0].message.content.trim();

                // 4. 번역 결과 화면에 부드럽게 출력
                document.getElementById('cnation-chineseOutput').innerHTML = `<div class="animate-slide-up">${resultText}</div>`;

            } catch (err) {
                console.error(err);
                alert("사진 분석 중 오류가 발생했습니다. 이미지가 너무 복잡하거나 네트워크가 불안정할 수 있습니다.");
                document.getElementById('cnation-chineseOutput').innerHTML = '<span class="text-red-500 font-bold">오류가 발생했습니다. 다시 촬영해 주세요.</span>';
            }

            // 5. 로딩 종료 및 입력창 초기화 (연속 촬영 가능하도록)
            document.getElementById('cnation-loading').classList.add('hidden');
            e.target.value = '';
        });
    </script>
</body>

</html>
