<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cnation-china (비전 AI 사진번역기)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center shrink-0">
        <h1 class="text-lg font-bold"><i class="fas fa-camera mr-2 text-yellow-300"></i>스마트 번역기</h1>
        <div id="engineBadge" onclick="toggleEngine()"
            class="cursor-pointer text-[10px] bg-blue-800 px-3 py-1.5 rounded-full font-black border border-blue-400 active:scale-95 transition">
            <i class="fas fa-sync-alt mr-1"></i> DEEPSEEK 모드
        </div>
    </div>

    <div class="flex-1 bg-white p-6 flex flex-col items-center justify-center relative overflow-y-auto">

        <div id="imagePreviewContainer" class="hidden w-full mb-4 flex flex-col items-center border-b pb-4">
            <span class="text-xs text-gray-400 mb-2 font-bold">📷 분석된 이미지</span>
            <img id="imagePreview" class="max-h-48 rounded-lg shadow-sm border border-gray-200" src="" alt="preview">
        </div>

        <p id="cnation-chineseOutput"
            class="text-[2rem] leading-tight font-black text-gray-800 text-center break-words w-full">
            <span class="text-gray-300 text-base font-normal">데이터를 불러오는 중...</span>
        </p>

        <button id="cnation-playBtn" onclick="cnation_speakChinese()"
            class="hidden mt-6 px-6 py-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-full font-bold text-sm shadow-sm active:scale-95 transition">
            <i class="fas fa-volume-up mr-2"></i>발음 듣기
        </button>

        <div id="cnation-loading"
            class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-5xl text-blue-500 mb-3"></i>
            <span class="text-blue-500 font-bold" id="loadingText">번역 중...</span>
        </div>
    </div>

    <div class="bg-gray-50 border-t border-gray-200 p-4 shadow-lg z-10 shrink-0">
        <textarea id="cnation-koreanInput" rows="2"
            class="w-full bg-white border border-gray-300 rounded-xl p-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3"
            placeholder="한국어 입력 또는 사진 촬영..."></textarea>

        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">

        <div class="flex gap-2">
            <button onclick="document.getElementById('cameraInput').click()"
                class="w-1/4 py-3 bg-teal-500 text-white rounded-xl font-bold text-sm flex flex-col items-center justify-center shadow-md active:scale-95"><i
                    class="fas fa-camera mb-1"></i>사진</button>

            <button onclick="cnation_translateText()"
                class="w-2/4 py-3 bg-blue-600 text-white rounded-xl font-bold text-base flex flex-col items-center justify-center shadow-md active:scale-95"><i
                    class="fas fa-exchange-alt mb-1"></i>변환하기</button>

            <button onclick="cnation_clearText()"
                class="w-1/4 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-sm flex flex-col items-center justify-center shadow-md active:scale-95"><i
                    class="fas fa-trash-alt mb-1"></i>지우기</button>
        </div>
    </div>

    <script type="module">
        // 🔑 Supabase 설정 (금고)
        const SUPABASE_URL = 'https://nydnthkqvpajufbycxjq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LWqTdLhSkspLke1HvFsmVA_KOYnGGaY';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const keyTableName = 'cnation_api_keys';
        let KEYS = { DeepSeek: "", Qwen: "" };
        let currentEngine = "DeepSeek";

        // ★ 앱 시작 시 키 불러오기
        async function fetchApiKeys() {
            const { data } = await _supabase.from(keyTableName).select('engine_name, api_key');
            if (data) {
                data.forEach(item => { KEYS[item.engine_name] = item.api_key; });
                document.getElementById('cnation-chineseOutput').innerHTML = '<span class="text-gray-300 text-base font-normal">엔진 준비 완료!<br>텍스트를 입력하거나<br>사진을 찍어보세요.</span>';
            }
        }
        fetchApiKeys();

        // 엔진 전환
        window.toggleEngine = () => {
            currentEngine = (currentEngine === "DeepSeek") ? "Qwen" : "DeepSeek";
            const badge = document.getElementById('engineBadge');
            badge.innerHTML = `<i class="fas fa-sync-alt mr-1"></i> ${currentEngine.toUpperCase()} 모드`;
            badge.className = `cursor-pointer text-[10px] ${currentEngine === "DeepSeek" ? 'bg-blue-800' : 'bg-orange-600'} px-3 py-1.5 rounded-full font-black border border-white/30 active:scale-95 transition`;
        };

        // Qwen 음성 읽기
        window.cnation_speakChinese = async () => { /* 이전의 Qwen TTS 코드 유지... */ };

        // ★ [NEW] 이미지 리사이징 함수 (API 용량 제한 방지)
        function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 800; // API 전송용 최적화 가로 사이즈
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); // Base64 반환
                    };
                };
            });
        }

        // ★ [NEW] 사진 촬영 및 Qwen-VL 사진 번역 로직
        document.getElementById('cameraInput').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!KEYS.Qwen) return alert("Qwen 엔진 키가 준비되지 않았습니다.");

            // 1. UI 업데이트: 로딩 표시 및 이미지 미리보기
            document.getElementById('cnation-loading').classList.remove('hidden');
            document.getElementById('loadingText').innerText = "사진을 분석 중입니다...";

            // 이미지 용량 압축 (Base64)
            const base64Image = await resizeImage(file);

            document.getElementById('imagePreview').src = base64Image;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');

            try {
                // 2. Qwen-VL(Vision Language) 모델 호출
                const res = await fetch("https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${KEYS.Qwen}` },
                    body: JSON.stringify({
                        model: "qwen-vl-plus", // ★ 시각 능력이 있는 Qwen 모델
                        messages: [{
                            role: "user",
                            content: [
                                { type: "image_url", image_url: { url: base64Image } },
                                { type: "text", text: "이 이미지에 있는 중국어 텍스트를 파악해서 한국어로 아주 자연스럽게 번역해줘. 이미지 속 상황을 유추해서 문맥에 맞게 번역하고, 결과는 한국어 번역 내용만 깔끔하게 텍스트로 보여줘." }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                let result = data.choices[0].message.content.trim();

                // 3. 결과 출력
                document.getElementById('cnation-chineseOutput').innerText = result;
                document.getElementById('cnation-playBtn').classList.add('hidden'); // 한국어 번역이므로 중국어 발음버튼 숨김

            } catch (err) {
                alert("사진 분석 중 오류가 발생했습니다.");
                console.error(err);
            }
            document.getElementById('cnation-loading').classList.add('hidden');
            e.target.value = ''; // 입력창 초기화
        });

        // 일반 텍스트 번역 로직
        window.cnation_translateText = async () => {
            const input = document.getElementById('cnation-koreanInput').value.trim();
            if (!input) return alert("입력하세요!");
            if (!KEYS[currentEngine]) return alert("엔진 준비중입니다.");

            document.getElementById('cnation-loading').classList.remove('hidden');
            document.getElementById('loadingText').innerText = "번역 중...";
            document.getElementById('imagePreviewContainer').classList.add('hidden'); // 텍스트 번역 시 이미지 숨김

            const config = currentEngine === "DeepSeek"
                ? { url: "https://api.deepseek.com/chat/completions", model: "deepseek-chat", key: KEYS.DeepSeek }
                : { url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions", model: "qwen-plus", key: KEYS.Qwen };

            try {
                const res = await fetch(config.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.key}` },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [{ role: "system", content: "너는 최고의 한중 통역사야. 자연스럽게 번역된 중국어 간체만 딱 출력해." }, { role: "user", content: input }],
                        temperature: 0.3
                    })
                });
                const data = await res.json();
                let result = data.choices[0].message.content.replace(/^\[?중국어\]?\s*:\s*/, '').trim();

                document.getElementById('cnation-chineseOutput').innerText = result;
                document.getElementById('cnation-playBtn').classList.remove('hidden');
            } catch (err) { alert("번역 오류가 발생했습니다!"); }
            document.getElementById('cnation-loading').classList.add('hidden');
        };

        // 지우기
        window.cnation_clearText = () => {
            document.getElementById('cnation-koreanInput').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('cnation-chineseOutput').innerHTML = '<span class="text-gray-300 text-base font-normal">한국어를 입력하거나<br>사진을 찍어보세요.</span>';
            document.getElementById('cnation-playBtn').classList.add('hidden');
        };
    </script>
</body>

</html>
